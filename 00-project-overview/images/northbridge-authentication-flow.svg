<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="386" viewBox="0 0 1200 386" role="img" aria-labelledby="title desc">
<title id="title">NorthBridge Authentication Flow</title>
<desc id="desc">Zero Trust sign-in path with device, policy, risk, and passwordless controls</desc>
<rect width="100%" height="100%" fill="#eef3f8"/>
<rect x="30" y="30" width="1140" height="326" rx="16" fill="#ffffff" stroke="#d5deea"/>
<text x="600.0" y="78" text-anchor="middle" font-family="Segoe UI, Arial" font-size="32" font-weight="700" fill="#172033">NorthBridge Authentication Flow</text>
<text x="600.0" y="108" text-anchor="middle" font-family="Segoe UI, Arial" font-size="16" fill="#53647c">Zero Trust sign-in path with device, policy, risk, and passwordless controls</text>
<rect x="60" y="140" width="252" height="112" rx="10" fill="#2563a6" stroke="#1d4f86" stroke-width="2"/>
<text x="186.0" y="174" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#ffffff">Sign-in Request</text>
<text x="186.0" y="202" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff">User starts access to</text>
<text x="186.0" y="222" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff">Microsoft 365, Azure, or</text>
<text x="186.0" y="242" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff">enterprise app</text>
<rect x="336" y="140" width="252" height="112" rx="10" fill="#f1fbf8" stroke="#6f8fc0" stroke-width="2"/>
<text x="462.0" y="174" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#172033">Device and CA Evaluation</text>
<text x="462.0" y="202" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#53647c">Device context and</text>
<text x="462.0" y="222" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#53647c">Conditional Access</text>
<text x="462.0" y="242" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#53647c">requirements are evaluated</text>
<rect x="612" y="140" width="252" height="112" rx="10" fill="#fff9e8" stroke="#6f8fc0" stroke-width="2"/>
<text x="738.0" y="174" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#172033">Risk and Passwordless</text>
<text x="738.0" y="202" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#53647c">Identity Protection signals</text>
<text x="738.0" y="222" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#53647c">and WHfB/FIDO2</text>
<text x="738.0" y="242" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#53647c">authentication are checked</text>
<rect x="888" y="140" width="252" height="112" rx="10" fill="#fff5f4" stroke="#6f8fc0" stroke-width="2"/>
<text x="1014.0" y="174" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#172033">Token and Access</text>
<text x="1014.0" y="202" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#53647c">Entra ID issues token after</text>
<text x="1014.0" y="222" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#53647c">requirements are satisfied</text>
<rect x="60" y="308" width="1080" height="38" rx="8" fill="#172033"/>
<text x="600.0" y="333" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff">Target-state workflow for fictional modernization planning.</text>
</svg>